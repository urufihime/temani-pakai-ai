<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Temani Pakai AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/login.css">
</head>
<body class="auth-page">

<div class="auth-card">
  <div class="auth-brand">
    <p class="eyebrow">Alat Bantu Mandiri Akademik</p>
    <h1>Temani Pakai AI</h1>
  </div>
  <p class="auth-subtitle">Masuk untuk melanjutkan asesmen.</p>

  <div id="error" class="banner banner-error auth-error" role="alert"></div>

  <form id="loginForm" novalidate>
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="nama@email.com" autocomplete="email" required>

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Password" autocomplete="current-password" required>

    <button type="submit" id="loginBtn" class="btn btn-primary" style="width:100%;">Masuk</button>
  </form>

  <div class="auth-footer">
    Belum punya akun? <a href="register.html">Daftar</a>
  </div>
</div>

<script type="module" src="js/auth.js"></script>
</body>
</html>
