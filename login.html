<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Temani Pakai AI</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{

    background:#f5f7fb;

    display:flex;

    justify-content:center;

    align-items:center;

    height:100vh;

}

.card{

    width:380px;

    background:white;

    padding:35px;

    border-radius:18px;

    box-shadow:0 10px 30px rgba(0,0,0,.1);

}

h1{

    text-align:center;

    color:#2563eb;

    margin-bottom:10px;

}

.subtitle{

    text-align:center;

    color:#666;

    font-size:14px;

    margin-bottom:30px;

}

label{

    display:block;

    margin-bottom:8px;

    font-weight:bold;

}

input{

    width:100%;

    padding:12px;

    border:1px solid #ccc;

    border-radius:8px;

    margin-bottom:18px;

}

button{

    width:100%;

    padding:14px;

    border:none;

    background:#2563eb;

    color:white;

    border-radius:8px;

    font-size:16px;

    cursor:pointer;

}

button:hover{

    background:#1d4ed8;

}

.footer{

    text-align:center;

    margin-top:20px;

    font-size:14px;

}

.footer a{

    color:#2563eb;

    text-decoration:none;

}

.error{

    color:red;

    text-align:center;

    margin-bottom:15px;

}

</style>

</head>

<body>

<div class="card">

<h1>Temani Pakai AI</h1>

<p class="subtitle">

Masuk untuk melanjutkan asesmen.

</p>

<div id="error" class="error"></div>

<label>Email</label>

<input
type="email"
id="email"
placeholder="nama@email.com">

<label>Password</label>

<input
type="password"
id="password"
placeholder="Password">

<button id="loginBtn">

Masuk

</button>

<div class="footer">

Belum punya akun?

<a href="register.html">

Daftar

</a>

</div>

</div>
<script type="module" src="js/auth.js"></script>
</body>

</html>
