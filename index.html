<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temani Pakai AI — Pemantau Ketergantungan AI Akademik</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink-navy:#1B2A4A;
  --ink-navy-2:#243660;
  --paper:#F7F4EA;
  --paper-2:#F1ECDD;
  --paper-line:#D9D0B8;
  --charcoal:#2B2B28;
  --cream:#F2EFE6;
  --gold:#C9A227;
  --gold-2:#A8871B;
  --moss:#3F6B4C;
  --moss-2:#2F5038;
  --amber:#B8791E;
  --amber-2:#8F5D14;
  --debt-red:#A83A32;
  --debt-red-2:#7E2A24;
  --shadow: 0 1px 0 rgba(43,43,40,0.06);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--paper);
  color:var(--charcoal);
  font-family:'Inter',sans-serif;
  font-size:15px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
.app{max-width:1040px;margin:0 auto;padding:0 20px 80px;}

/* ===== Header ===== */
.masthead{
  background:var(--ink-navy);
  color:var(--cream);
  padding:34px 20px 0;
  margin:0 -20px 0;
}
.masthead-inner{max-width:1000px;margin:0 auto;}
.eyebrow{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--gold);
  margin:0 0 10px;
}
.masthead h1{
  font-family:'Fraunces',serif;
  font-weight:600;
  font-size:clamp(28px,4vw,40px);
  margin:0 0 8px;
  letter-spacing:-0.01em;
}
.masthead p{
  max-width:620px;
  color:#C7CEE0;
  margin:0 0 26px;
  font-size:14.5px;
}
.tabs{display:flex;gap:2px;}
.tab{
  font-family:'IBM Plex Mono',monospace;
  font-size:12.5px;
  letter-spacing:.04em;
  background:transparent;
  border:none;
  color:#9FAAC4;
  padding:13px 22px;
  cursor:pointer;
  border-radius:8px 8px 0 0;
  position:relative;
  transition:color .15s ease;
}
.tab:hover{color:var(--cream);}
.tab.active{
  background:var(--paper);
  color:var(--ink-navy);
  font-weight:600;
}
.tab:focus-visible{outline:2px solid var(--gold);outline-offset:2px;}

/* ===== Cards / ledger sheet ===== */
.sheet{
  background:var(--paper);
  border:1px solid var(--paper-line);
  border-top:none;
  padding:28px;
}
.card{
  background:var(--paper);
  border:1px solid var(--paper-line);
  border-radius:3px;
  padding:22px 24px;
  margin-bottom:18px;
  box-shadow:var(--shadow);
}
.card-head{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  gap:12px;
  border-bottom:1px solid var(--paper-line);
  padding-bottom:12px;
  margin-bottom:16px;
}
.card-head h2{
  font-family:'Fraunces',serif;
  font-weight:600;
  font-size:19px;
  margin:0;
  color:var(--ink-navy);
}
.card-head .tag{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;
  color:#8a8368;
  letter-spacing:.05em;
}
label{
  display:block;
  font-size:12.5px;
  font-weight:600;
  color:#5c5847;
  margin:0 0 5px;
}
input[type=text],input[type=password],input[type=date],select,textarea{
  width:100%;
  font-family:'Inter',sans-serif;
  font-size:14.5px;
  padding:10px 12px;
  border:1px solid var(--paper-line);
  border-radius:4px;
  background:#fff;
  color:var(--charcoal);
  margin-bottom:14px;
}
input:focus-visible,select:focus-visible,textarea:focus-visible,button:focus-visible{
  outline:2px solid var(--gold);
  outline-offset:1px;
}
textarea{resize:vertical;min-height:70px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:600px){.field-row{grid-template-columns:1fr;}}

.btn{
  font-family:'Inter',sans-serif;
  font-weight:600;
  font-size:14px;
  padding:10px 20px;
  border-radius:4px;
  border:1px solid transparent;
  cursor:pointer;
  transition:transform .08s ease, opacity .15s ease;
}
.btn:active{transform:translateY(1px);}
.btn-primary{background:var(--ink-navy);color:var(--cream);}
.btn-primary:hover{background:var(--ink-navy-2);}
.btn-ghost{background:transparent;color:var(--ink-navy);border-color:var(--paper-line);}
.btn-ghost:hover{background:var(--paper-2);}
.btn-small{padding:6px 12px;font-size:12.5px;}
.btn[disabled]{opacity:.45;cursor:not-allowed;}

.helptext{font-size:12.5px;color:#847d63;margin-top:-8px;margin-bottom:14px;}

/* ===== Radio pills for category ===== */
.pillset{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.pill{
  font-family:'IBM Plex Mono',monospace;
  font-size:12.5px;
  padding:8px 14px;
  border-radius:20px;
  border:1.5px solid var(--paper-line);
  background:#fff;
  cursor:pointer;
  color:#5c5847;
  transition:all .12s ease;
}
.pill[data-active="true"][data-cat="mandiri"]{background:var(--moss);border-color:var(--moss);color:#fff;}
.pill[data-active="true"][data-cat="sebagian"]{background:var(--amber);border-color:var(--amber);color:#fff;}
.pill[data-active="true"][data-cat="sangat"]{background:var(--debt-red);border-color:var(--debt-red);color:#fff;}

/* ===== Warning banner ===== */
.banner{
  border-radius:4px;
  padding:20px 22px;
  margin-bottom:20px;
  border:1.5px solid;
  position:relative;
}
.banner-aman{background:#EEF4EC;border-color:var(--moss);}
.banner-waspada{background:#FBF2DC;border-color:var(--gold);}
.banner-tinggi{background:#FCEDDD;border-color:var(--amber);}
.banner-kritis{background:#FBE7E5;border-color:var(--debt-red);}
.banner-label{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;
  letter-spacing:.1em;
  text-transform:uppercase;
  font-weight:600;
  margin-bottom:6px;
}
.banner-aman .banner-label{color:var(--moss-2);}
.banner-waspada .banner-label{color:var(--gold-2);}
.banner-tinggi .banner-label{color:var(--amber-2);}
.banner-kritis .banner-label{color:var(--debt-red-2);}
.banner h3{
  font-family:'Fraunces',serif;
  font-size:20px;
  margin:0 0 8px;
  color:var(--charcoal);
}
.banner p{margin:0 0 8px;font-size:14px;color:#3c3a32;}
.banner ul{margin:8px 0 12px;padding-left:20px;font-size:13.5px;color:#3c3a32;}
.banner .action{
  font-size:13.5px;
  font-weight:600;
  background:rgba(255,255,255,.55);
  border-radius:4px;
  padding:10px 14px;
  margin-top:6px;
}

/* ===== Balance gauge (signature element) ===== */
.gauge-wrap{display:flex;align-items:center;gap:22px;flex-wrap:wrap;}
.gauge-labels{display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:11px;color:#847d63;margin-top:6px;}
.gauge-num{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--charcoal);}

/* ===== Task list ===== */
.ledger-row{
  display:grid;
  grid-template-columns:auto 1fr auto auto;
  gap:12px;
  align-items:center;
  padding:10px 0;
  border-bottom:1px dashed var(--paper-line);
  font-size:13.5px;
}
.ledger-row:last-child{border-bottom:none;}
.ledger-date{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:#847d63;white-space:nowrap;}
.badge{
  font-family:'IBM Plex Mono',monospace;
  font-size:10.5px;
  letter-spacing:.03em;
  padding:3px 9px;
  border-radius:12px;
  white-space:nowrap;
  color:#fff;
}
.badge-mandiri{background:var(--moss);}
.badge-sebagian{background:var(--amber);}
.badge-sangat{background:var(--debt-red);}
.empty{color:#9a927a;font-size:13.5px;font-style:italic;padding:10px 0;}

/* ===== Rules ===== */
.rule-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:10px 0;
  border-bottom:1px dashed var(--paper-line);
}
.rule-row:last-child{border-bottom:none;}
.rule-text{font-size:14px;}
.rule-actions{display:flex;gap:6px;}
.chip{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;
  padding:5px 10px;
  border-radius:14px;
  border:1px solid var(--paper-line);
  background:#fff;
  cursor:pointer;
  color:#5c5847;
}
.chip:hover{background:var(--paper-2);}
.chip.on-ok{background:var(--moss);color:#fff;border-color:var(--moss);}
.chip.on-break{background:var(--debt-red);color:#fff;border-color:var(--debt-red);}

/* ===== Chart ===== */
.chart-legend{display:flex;gap:16px;font-size:12px;color:#5c5847;margin-top:10px;flex-wrap:wrap;}
.legend-dot{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px;}

/* ===== Journal ===== */
.journal-entry{padding:12px 0;border-bottom:1px dashed var(--paper-line);}
.journal-entry:last-child{border-bottom:none;}
.journal-date{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#847d63;margin-bottom:4px;}

/* ===== Setup screen ===== */
.setup-wrap{max-width:480px;margin:40px auto;text-align:left;}
.setup-wrap .card{margin-bottom:0;}
.toggle-anon{display:flex;align-items:center;gap:8px;margin:-4px 0 16px;font-size:13px;color:#5c5847;}

/* ===== Quiz ===== */
.quiz-q{margin-bottom:22px;}
.quiz-q p.qtext{font-weight:600;font-size:14.5px;margin:0 0 10px;color:var(--charcoal);}
.quiz-opt{
  display:block;
  width:100%;
  text-align:left;
  background:#fff;
  border:1.5px solid var(--paper-line);
  border-radius:4px;
  padding:10px 14px;
  margin-bottom:7px;
  cursor:pointer;
  font-size:13.5px;
  color:var(--charcoal);
  font-family:'Inter',sans-serif;
}
.quiz-opt[data-selected="true"]{border-color:var(--ink-navy);background:var(--paper-2);font-weight:600;}
.quiz-progress{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#847d63;margin-bottom:18px;}

/* ===== Dosen table ===== */
table.class-table{width:100%;border-collapse:collapse;font-size:13.5px;}
table.class-table th{
  text-align:left;
  font-family:'IBM Plex Mono',monospace;
  font-size:10.5px;
  letter-spacing:.05em;
  text-transform:uppercase;
  color:#847d63;
  border-bottom:1.5px solid var(--paper-line);
  padding:8px 10px;
}
table.class-table td{
  padding:11px 10px;
  border-bottom:1px dashed var(--paper-line);
  vertical-align:middle;
}
table.class-table tr:hover td{background:var(--paper-2);cursor:pointer;}
.risk-dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:7px;vertical-align:middle;}
.risk-aman{background:var(--moss);}
.risk-waspada{background:var(--gold);}
.risk-tinggi{background:var(--amber);}
.risk-kritis{background:var(--debt-red);}

.stat-row{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:20px;}
.stat-box{
  flex:1;
  min-width:120px;
  background:#fff;
  border:1px solid var(--paper-line);
  border-radius:4px;
  padding:14px 16px;
}
.stat-box .n{font-family:'Fraunces',serif;font-size:26px;font-weight:600;color:var(--ink-navy);}
.stat-box .l{font-size:11px;font-family:'IBM Plex Mono',monospace;color:#847d63;text-transform:uppercase;letter-spacing:.04em;}

.modal-overlay{
  position:fixed;inset:0;background:rgba(27,42,74,.55);
  display:flex;align-items:center;justify-content:center;
  padding:20px;z-index:50;
}
.modal{
  background:var(--paper);
  border-radius:6px;
  max-width:560px;width:100%;
  max-height:85vh;overflow-y:auto;
  padding:26px 28px;
  border:1px solid var(--paper-line);
}
.modal-close{
  float:right;background:none;border:none;font-size:20px;cursor:pointer;color:#847d63;line-height:1;
}

.note{
  font-size:12px;color:#847d63;background:var(--paper-2);
  border:1px solid var(--paper-line);border-radius:4px;padding:10px 12px;margin-top:6px;
}
details.cloud-settings{
  border:1px dashed var(--paper-line);
  border-radius:4px;
  padding:10px 14px;
  margin-bottom:16px;
  background:#fff;
}
details.cloud-settings summary{
  cursor:pointer;
  font-size:12.5px;
  font-weight:600;
  color:var(--ink-navy);
  font-family:'IBM Plex Mono',monospace;
}
details.cloud-settings[open] summary{margin-bottom:10px;}

@media (prefers-reduced-motion: reduce){
  *{transition:none !important;animation:none !important;}
}
</style>
</head>
<body>

<div class="masthead">
  <div class="masthead-inner">
    <p class="eyebrow">Alat Bantu Mandiri Akademik</p>
    <h1>Temani Pakai AI</h1>
    <p>Mengetahui pola penggunaan AI dalam perkuliahan, memberi peringatan dini sebelum ketergantungan menumpuk jadi "utang kognitif", dan membantu dosen memantau kelas.</p>
    <div class="tabs">
      <button class="tab active" id="tabMhs" onclick="switchMode('mahasiswa')">MAHASISWA</button>
      <button class="tab" id="tabDsn" onclick="switchMode('dosen')">DOSEN</button>
    </div>
  </div>
</div>

<div class="app">
  <div class="sheet" id="sheet">
    <div id="root">Memuat…</div>
  </div>
</div>

<script>
/* ============================================================
   STATE & STORAGE
   ============================================================ */
let MODE = 'mahasiswa';
let LOCAL_REF = null;      // {kelas, studentId}
let PROFILE = null;        // full student profile object
let VIEW = 'loading';      // loading | setup | quiz | dashboard
let DOSEN_KELAS = null;
let DOSEN_META = null;     // {dosenNama, passHash, createdAt}
let CLASS_DATA = null;     // {students:[...profiles]}
let SELECTED_STUDENT = null;

const CATS = {
  mandiri:  {label:'Mandiri',            badge:'badge-mandiri',  pillClass:'mandiri'},
  sebagian: {label:'Dibantu Sebagian',   badge:'badge-sebagian', pillClass:'sebagian'},
  sangat:   {label:'Sangat Bergantung',  badge:'badge-sangat',   pillClass:'sangat'}
};

const QUIZ = [
  {q:"Seberapa sering kamu menggunakan AI untuk membuat draf pertama tugas kuliah?",
   opts:["Hampir tidak pernah","Kadang-kadang","Sering","Hampir selalu"]},
  {q:"Kalau AI tiba-tiba tidak bisa diakses, seberapa yakin kamu bisa menyelesaikan tugas itu sendiri?",
   opts:["Sangat yakin","Cukup yakin","Kurang yakin","Tidak yakin sama sekali"]},
  {q:"Seberapa sering kamu mengumpulkan tugas tanpa benar-benar memahami isi yang dibuat AI?",
   opts:["Tidak pernah","Jarang","Cukup sering","Sering"]},
  {q:"Setelah AI memberi jawaban, seberapa besar kamu mengedit ulang atau memverifikasi isinya dengan pemahamanmu sendiri?",
   opts:["Selalu saya tulis ulang dengan pemahaman sendiri","Saya edit cukup banyak","Saya edit sedikit","Saya pakai hampir apa adanya"]},
  {q:"Apakah kamu merasa cemas atau tidak nyaman saat mengerjakan tugas tanpa membuka AI?",
   opts:["Tidak sama sekali","Sedikit","Cukup cemas","Sangat cemas"]},
  {q:"Berapa lama rata-rata kamu membuka AI untuk kebutuhan akademik per hari?",
   opts:["Kurang dari 30 menit","30–60 menit","1–3 jam","Lebih dari 3 jam"]},
  {q:"Dalam sebulan terakhir, seberapa sering kamu mencoba mengerjakan tugas kuliah tanpa bantuan AI sama sekali?",
   opts:["Hampir selalu tanpa AI","Sering tanpa AI","Jarang tanpa AI","Hampir tidak pernah tanpa AI"]}
];
let quizAnswers = new Array(QUIZ.length).fill(null);
let quizStep = 0;

/* ============================================================
   SAFE STORAGE LAYER
   Three backends, layered:
   - Cloud (Firebase Realtime Database REST API, free tier): the
     only backend that actually syncs across different browsers
     and devices. Off by default — activated when someone pastes
     a free Firebase database URL into "Pengaturan Basis Data
     Cloud". Only used for shared (class-wide) data.
   - window.storage: only injected inside Claude.ai's file preview.
   - localStorage: available in any normal browser, this device only.
   Reads try cloud, then window.storage, then localStorage.
   Writes go to every backend that's available/configured.
   ============================================================ */
let STORAGE_OK = false;     // true if window.storage (shared, cross-device) is available
let LOCAL_DB_OK = false;    // true if localStorage (this browser only) is available
let CLOUD_DB_URL = '';      // Firebase Realtime Database base URL, e.g. https://xxx-default-rtdb.region.firebasedatabase.app
let CLOUD_STATUS = null;    // {ok:true} | {ok:false, reason:'...'} | null (not tested yet)
let CLOUD_TESTING = false;
let CLOUD_PANEL_OPEN = false;

function storageReady(){
  return typeof window.storage !== 'undefined' && window.storage !== null;
}
function checkLocalStorage(){
  try{
    const k = '__neraca_test__';
    window.localStorage.setItem(k, '1');
    window.localStorage.removeItem(k);
    return true;
  }catch(e){ return false; }
}
function lsKey(key, shared){
  return 'neraca:' + (shared ? 'shared' : 'personal') + ':' + key;
}
function loadCloudConfig(){
  try{ CLOUD_DB_URL = window.localStorage.getItem('neraca:cloud-db-url') || ''; }
  catch(e){ CLOUD_DB_URL = ''; }
}
function saveCloudConfig(url){
  CLOUD_DB_URL = (url||'').trim().replace(/\/+$/,'');
  try{ window.localStorage.setItem('neraca:cloud-db-url', CLOUD_DB_URL); }catch(e){}
}
function cloudConfigured(){ return !!CLOUD_DB_URL; }

// Firebase Realtime Database forbids . # $ [ ] inside a key segment.
// Our composite keys (e.g. "profile:TI-2024-A:MHS-XXXX") are user-influenced
// (class codes, names), so they must be sanitized before use as a path.
function cloudSafeKey(key){
  return key.replace(/[.#$\[\]]/g, ch => '~' + ch.charCodeAt(0).toString(16));
}
function cloudUrlFor(key){
  return `${CLOUD_DB_URL}/${encodeURIComponent(cloudSafeKey(key))}.json`;
}

async function cloudGet(key){
  if(!cloudConfigured()) return null;
  try{
    const res = await fetch(cloudUrlFor(key));
    if(!res.ok) return null;
    const data = await res.json();
    if(data === null || data === undefined) return null;
    return data; // already the raw stored string
  }catch(e){ return null; }
}
async function cloudSet(key, value){
  if(!cloudConfigured()) return false;
  try{
    const res = await fetch(cloudUrlFor(key), {
      method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(value)
    });
    return res.ok;
  }catch(e){ return false; }
}
async function cloudDelete(key){
  if(!cloudConfigured()) return false;
  try{
    const res = await fetch(cloudUrlFor(key), { method:'DELETE' });
    return res.ok;
  }catch(e){ return false; }
}

// Actually exercises the configured URL with a real write + read + cleanup,
// so misconfiguration (locked rules, wrong URL, offline) is caught immediately
// instead of failing silently later.
async function testCloudConnection(url){
  const base = (url||'').trim().replace(/\/+$/,'');
  if(!base) return {ok:false, reason:'URL kosong.'};
  if(!/^https:\/\//i.test(base)) return {ok:false, reason:'URL harus diawali https://'};

  const testKey = cloudSafeKey('__connectivity_test__');
  const testUrl = `${base}/${testKey}.json`;
  let putRes;
  try{
    putRes = await fetch(testUrl, {
      method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(Date.now())
    });
  }catch(e){
    return {ok:false, reason:'Tidak bisa terhubung ke URL ini. Periksa lagi URL-nya dan koneksi internet.'};
  }
  if(!putRes.ok){
    if(putRes.status===401 || putRes.status===403){
      return {ok:false, reason:'Akses ditolak (401/403). Buka Firebase Console → Realtime Database → Rules, lalu atur ".read": true dan ".write": true (mode test).'};
    }
    return {ok:false, reason:`Server menolak permintaan (HTTP ${putRes.status}). Pastikan ini benar URL Realtime Database, bukan Firestore.`};
  }
  try{
    const getRes = await fetch(testUrl);
    if(!getRes.ok) return {ok:false, reason:`Berhasil menulis tapi gagal membaca kembali (HTTP ${getRes.status}).`};
    await fetch(testUrl, {method:'DELETE'}).catch(()=>{});
    return {ok:true};
  }catch(e){
    return {ok:false, reason:'Berhasil menulis tapi gagal membaca kembali — coba lagi.'};
  }
}

async function safeGet(key, shared=false){
  if(shared && cloudConfigured()){
    const v = await cloudGet(key);
    if(v !== null) return {key, value: v, shared};
  }
  if(storageReady()){
    try{
      const r = await window.storage.get(key, shared);
      if(r) return r;
    }catch(e){ /* not found or unavailable — fall through */ }
  }
  if(LOCAL_DB_OK){
    const raw = window.localStorage.getItem(lsKey(key, shared));
    if(raw !== null) return {key, value: raw, shared};
  }
  return null;
}
async function safeSet(key, value, shared=false){
  let ok = false;
  if(shared && cloudConfigured()){
    if(await cloudSet(key, value)) ok = true;
  }
  if(storageReady()){
    try{ await window.storage.set(key, value, shared); ok = true; }
    catch(e){ console.error('Gagal menyimpan ke penyimpanan bersama:', e); }
  }
  if(LOCAL_DB_OK){
    try{ window.localStorage.setItem(lsKey(key, shared), value); ok = true; }
    catch(e){ console.error('Gagal menyimpan ke basis data lokal:', e); }
  }
  return ok;
}
async function safeDelete(key, shared=false){
  let ok = false;
  if(shared && cloudConfigured()){
    if(await cloudDelete(key)) ok = true;
  }
  if(storageReady()){
    try{ await window.storage.delete(key, shared); ok = true; }catch(e){}
  }
  if(LOCAL_DB_OK){
    try{ window.localStorage.removeItem(lsKey(key, shared)); ok = true; }catch(e){}
  }
  return ok;
}

function simpleHash(str){
  let h = 0;
  for(let i=0;i<str.length;i++){ h = (Math.imul(31,h) + str.charCodeAt(i))|0; }
  return (h>>>0).toString(36);
}
// Class codes are typed independently by students and lecturers — if one types
// "ti-2024-a" and another "TI-2024-A " (trailing space), they'd silently write
// to two different storage keys and never see each other's data. Canonicalize
// every class code the same way, everywhere it's used as part of a storage key.
function canonKelas(k){
  return (k||'').trim().toUpperCase().replace(/\s+/g,' ');
}

/* ============================================================
   RISK / EARLY WARNING ENGINE
   ============================================================ */
function assessmentLevelIndex(score){
  if(score<=7) return 0;      // rendah
  if(score<=14) return 1;     // sedang
  return 2;                   // tinggi
}

function last7DaysTasks(profile){
  const cutoff = Date.now() - 7*24*60*60*1000;
  return (profile.tasks||[]).filter(t => new Date(t.date).getTime() >= cutoff);
}

function todayTasks(profile){
  const today = new Date().toISOString().slice(0,10);
  return (profile.tasks||[]).filter(t => t.date === today);
}

function computeRisk(profile){
  const base = assessmentLevelIndex(profile.assessmentScore || 0);
  const week = last7DaysTasks(profile);
  const veryCount = week.filter(t=>t.category==='sangat').length;
  const ratio = week.length>0 ? veryCount/week.length : 0;
  const todayVery = todayTasks(profile).filter(t=>t.category==='sangat').length;

  let add = 0;
  if(ratio > 0.75 || todayVery >= 5) add = 2;
  else if(ratio > 0.5 || todayVery >= 3) add = 1;

  const total = Math.min(base + add, 3);
  const levels = ['aman','waspada','tinggi','kritis'];
  return {level: levels[total], ratio, veryCount, weekTotal: week.length, todayVery, score: total};
}

async function submitSetup(){
  syncCloudFieldIfPresent();
  const kelas = canonKelas(document.getElementById('inKelas').value.trim());
  const nama = document.getElementById('inNama').value.trim();
  const anon = document.getElementById('inAnon').checked;
  const pass = document.getElementById('inPass').value;
  if(!kelas){ alert('Masukkan kode kelas terlebih dahulu.'); return; }
  if(!nama){ alert('Masukkan nama.'); return; }
  if(!pass){ alert('Buat atau masukkan kata kunci.'); return; }

  const slug = kelas.toLowerCase().trim() + '|' + nama.toLowerCase().trim();
  const studentId = 'MHS-' + simpleHash(slug).toUpperCase();
  const displayName = anon ? ('ANM-' + simpleHash(slug + '|display').toUpperCase()) : nama;
  const passHash = simpleHash(pass);

  try{
    const existing = await safeGet(`profile:${kelas}:${studentId}`, true);
    let existingProfile = null;
    if(existing){ try{ existingProfile = JSON.parse(existing.value); }catch(e){ existingProfile = null; } }

    if(existingProfile && existingProfile.passHash && existingProfile.passHash !== passHash){
      alert('Kata kunci salah untuk nama ini. Periksa lagi, atau gunakan nama lain jika ini profil baru.');
      return;
    }

    if(existingProfile){
      PROFILE = existingProfile;
      PROFILE.displayName = displayName;
      PROFILE.anon = anon;
      PROFILE.passHash = passHash;
    }else{
      PROFILE = {
        kelas, studentId, displayName, anon, passHash,
        assessmentDone:false, assessmentScore:0, assessmentLevel:'',
        tasks:[], rules:[], ruleLogs:[], journal:[]
      };
    }

    await saveProfile();
    await addToClassIndex(kelas, studentId, displayName);
    LOCAL_REF = {kelas, studentId};
    await safeSet('local-profile-ref', JSON.stringify(LOCAL_REF), false);
  }catch(e){
    console.error('Penyimpanan bermasalah, lanjut tanpa penyimpanan permanen:', e);
    if(!PROFILE){
      PROFILE = {
        kelas, studentId, displayName, anon, passHash,
        assessmentDone:false, assessmentScore:0, assessmentLevel:'',
        tasks:[], rules:[], ruleLogs:[], journal:[]
      };
    }
  }

  VIEW = PROFILE.assessmentDone ? 'dashboard' : 'quiz';
  quizStep = 0;
  quizAnswers = new Array(QUIZ.length).fill(null);
  render();
}

function renderGaugeMeter(risk){
  const cx=130, cy=115, r=95, needleLen=72;
  const colors = ['#3F6B4C','#C9A227','#B8791E','#A83A32'];
  function polar(rad, angleDeg){
    const a = angleDeg*Math.PI/180;
    return {x: cx + rad*Math.cos(a), y: cy - rad*Math.sin(a)};
  }
  function arcPath(rad, a1, a2){
    const p1 = polar(rad,a1), p2 = polar(rad,a2);
    const large = (a1-a2) > 180 ? 1 : 0;
    return `M ${p1.x.toFixed(2)} ${p1.y.toFixed(2)} A ${rad} ${rad} 0 ${large} 1 ${p2.x.toFixed(2)} ${p2.y.toFixed(2)}`;
  }
  let bands = '';
  for(let i=0;i<4;i++){
    const a1 = 180 - i*45;
    const a2 = 180 - (i+1)*45;
    bands += `<path d="${arcPath(r,a1,a2)}" stroke="${colors[i]}" stroke-width="20" fill="none"/>`;
  }
  const continuous = Math.min(3, risk.score + (risk.ratio||0)*0.9);
  const needleAngle = 180 - (continuous/3)*180;
  const tip = polar(needleLen, needleAngle);
  return `
  <svg viewBox="0 0 260 138" width="100%" style="max-width:320px;display:block;margin:0 auto;">
    ${bands}
    <line x1="${cx}" y1="${cy}" x2="${tip.x.toFixed(2)}" y2="${tip.y.toFixed(2)}" stroke="var(--charcoal)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="${cx}" cy="${cy}" r="6" fill="var(--charcoal)"/>
    <text x="20" y="${cy+22}" font-size="10" font-family="IBM Plex Mono, monospace" fill="#847d63">Aman</text>
    <text x="${2*cx-46}" y="${cy+22}" font-size="10" font-family="IBM Plex Mono, monospace" fill="#847d63">Kritis</text>
  </svg>
  <p style="text-align:center;font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:#5c5847;margin:4px 0 0;">
    Level saat ini: <strong style="color:var(--charcoal);">${capitalize(risk.level)}</strong> ·
    ${risk.veryCount}/${risk.weekTotal||0} tugas minggu ini "Sangat Bergantung"
  </p>`;
}

function renderWeekChart(week){
  const days = [];
  for(let i=6;i>=0;i--){
    const d = new Date(Date.now()-i*86400000);
    days.push(d.toISOString().slice(0,10));
  }
  const counts = days.map(day=>{
    const dayTasks = week.filter(t=>t.date===day);
    return {
      mandiri: dayTasks.filter(t=>t.category==='mandiri').length,
      sebagian: dayTasks.filter(t=>t.category==='sebagian').length,
      sangat: dayTasks.filter(t=>t.category==='sangat').length,
    };
  });
  const maxV = Math.max(1, ...counts.map(c=>c.mandiri+c.sebagian+c.sangat));
  const barW = 34, gap = 14, chartH = 110;
  const svgW = days.length*(barW+gap);
  let bars = '';
  counts.forEach((c,i)=>{
    const x = i*(barW+gap);
    let y = chartH;
    const segs = [['mandiri',c.mandiri,'#3F6B4C'],['sebagian',c.sebagian,'#B8791E'],['sangat',c.sangat,'#A83A32']];
    segs.forEach(([key,val,color])=>{
      const h = (val/maxV)*chartH;
      y -= h;
      if(val>0) bars += `<rect x="${x}" y="${y}" width="${barW}" height="${h}" fill="${color}" rx="1.5"/>`;
    });
    const label = days[i].slice(5).replace('-','/');
    bars += `<text x="${x+barW/2}" y="${chartH+16}" font-size="9.5" font-family="IBM Plex Mono, monospace" fill="#847d63" text-anchor="middle">${label}</text>`;
  });
  return `
  <svg viewBox="0 0 ${svgW} ${chartH+26}" width="100%" style="max-width:${svgW}px;margin-top:16px;">
    ${bars}
  </svg>
  <div class="chart-legend">
    <span><span class="legend-dot" style="background:#3F6B4C;"></span>Mandiri</span>
    <span><span class="legend-dot" style="background:#B8791E;"></span>Dibantu Sebagian</span>
    <span><span class="legend-dot" style="background:#A83A32;"></span>Sangat Bergantung</span>
  </div>`;
}

function renderTaskList(tasks){
  if(!tasks.length) return '<p class="empty">Belum ada tugas dicatat.</p>';
  return tasks.map(t=>`
    <div class="ledger-row">
      <span class="ledger-date">${t.date}</span>
      <span>${t.course ? `<strong>${escapeHtml(t.course)}</strong> — ` : ''}${escapeHtml(t.title)}</span>
      <span class="badge ${CATS[t.category].badge}">${CATS[t.category].label}</span>
      <button class="chip" onclick="deleteTask('${t.id}')" title="Hapus">✕</button>
    </div>
  `).join('');
}

function renderRules(){
  if(!PROFILE.rules.length) return '<p class="empty">Belum ada aturan pribadi.</p>';
  const today = new Date().toISOString().slice(0,10);
  return PROFILE.rules.map(r=>{
    const log = (PROFILE.ruleLogs||[]).find(l=>l.ruleId===r.id && l.date===today);
    return `
    <div class="rule-row">
      <span class="rule-text">${escapeHtml(r.text)}</span>
      <div class="rule-actions">
        <button class="chip ${log && log.followed? 'on-ok':''}" onclick="logRule('${r.id}', true)">Ditaati</button>
        <button class="chip ${log && log.followed===false? 'on-break':''}" onclick="logRule('${r.id}', false)">Dilanggar</button>
        <button class="chip" onclick="deleteRule('${r.id}')">✕</button>
      </div>
    </div>`;
  }).join('');
}

function renderJournal(){
  if(!PROFILE.journal.length) return '<p class="empty">Belum ada refleksi.</p>';
  return PROFILE.journal.slice().reverse().slice(0,6).map(j=>`
    <div class="journal-entry">
      <div class="journal-date">${j.date}</div>
      <div>${escapeHtml(j.text)}</div>
    </div>
  `).join('');
}

/* ---- Mahasiswa handlers ---- */
function setTaskCat(cat){ taskCategoryDraft = cat; render(); }

async function addTask(){
  const course = document.getElementById('taskCourse').value.trim();
  const title = document.getElementById('taskTitle').value.trim();
  if(!course){ alert('Isi nama mata kuliah dulu.'); return; }
  if(!title){ alert('Isi judul tugas dulu.'); return; }
  const task = {
    id:'t'+Date.now(), course, title, category:taskCategoryDraft,
    date:new Date().toISOString().slice(0,10)
  };
  PROFILE.tasks.push(task);
  await saveProfile();
  taskCategoryDraft = 'mandiri';
  render();
}

async function deleteTask(id){
  PROFILE.tasks = PROFILE.tasks.filter(t=>t.id!==id);
  await saveProfile();
  render();
}

async function addRule(){
  const text = document.getElementById('ruleText').value.trim();
  if(!text) return;
  PROFILE.rules.push({id:'r'+Date.now(), text});
  await saveProfile();
  render();
}

async function deleteRule(id){
  PROFILE.rules = PROFILE.rules.filter(r=>r.id!==id);
  PROFILE.ruleLogs = (PROFILE.ruleLogs||[]).filter(l=>l.ruleId!==id);
  await saveProfile();
  render();
}

async function logRule(ruleId, followed){
  const today = new Date().toISOString().slice(0,10);
  PROFILE.ruleLogs = PROFILE.ruleLogs || [];
  const existing = PROFILE.ruleLogs.find(l=>l.ruleId===ruleId && l.date===today);
  if(existing) existing.followed = followed;
  else PROFILE.ruleLogs.push({ruleId, date:today, followed});
  await saveProfile();
  render();
}

async function addJournal(){
  const text = document.getElementById('journalText').value.trim();
  if(!text) return;
  PROFILE.journal.push({date:new Date().toISOString().slice(0,10), text});
  await saveProfile();
  render();
}

async function openClass(){
  syncCloudFieldIfPresent();
  const kelas = canonKelas(document.getElementById('dsnKelas').value.trim());
  const dosenNama = document.getElementById('dsnNama').value.trim();
  const pass = document.getElementById('dsnPass').value;
  if(!kelas){ alert('Masukkan kode kelas.'); return; }
  if(!dosenNama){ alert('Masukkan nama dosen.'); return; }
  if(!pass){ alert('Masukkan kata kunci.'); return; }
  const passHash = simpleHash(pass);

  const metaRaw = await safeGet(`class-meta:${kelas}`, true);
  let meta = null;
  if(metaRaw){ try{ meta = JSON.parse(metaRaw.value); }catch(e){ meta = null; } }

  if(meta){
    if(meta.passHash !== passHash){
      alert('Kata kunci salah untuk kelas ini. Hubungi dosen yang pertama kali membuka kelas ini jika lupa.');
      return;
    }
  }else{
    meta = {dosenNama, passHash, createdAt:new Date().toISOString()};
    await safeSet(`class-meta:${kelas}`, JSON.stringify(meta), true);
  }

  DOSEN_KELAS = kelas;
  DOSEN_META = meta;
  CLASS_DATA = null;
  render();

  const r = await safeGet(`class-index:${kelas}`, true);
  let idx = [];
  try{ idx = r ? JSON.parse(r.value) : []; }catch(e){ idx = []; }
  const students = [];
  for(const entry of idx){
    const pr = await safeGet(`profile:${kelas}:${entry.studentId}`, true);
    if(pr){
      try{ students.push(JSON.parse(pr.value)); }catch(e){ /* skip corrupt entry */ }
    }
  }
  CLASS_DATA = {students};
  render();
}

function openStudent(id){
  SELECTED_STUDENT = CLASS_DATA.students.find(s=>s.studentId===id);
  render();
}

function renderStudentModal(){
  const s = SELECTED_STUDENT;
  const r = computeRisk(s);
  const week = last7DaysTasks(s);
  return `

    <div class="modal">
      <button class="modal-close" onclick="SELECTED_STUDENT=null;render();">×</button>
      <p class="eyebrow" style="color:var(--gold-2)">Detail Mahasiswa</p>
      <h2 style="font-family:'Fraunces',serif;margin:6px 0 4px;">${escapeHtml(s.displayName)}</h2>
      <p class="helptext" style="margin-bottom:16px;">Penilaian awal: ${s.assessmentDone? capitalize(s.assessmentLevel):'belum mengisi'}</p>

        ${renderTaskList(s.tasks.slice().reverse().slice(0,10))}
      </div>
    </div>
  </div>`;
}
